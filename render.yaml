services:
  - type: web
    name: pic-reel
    runtime: node
    branch: main
    buildCommand: npm install && npm run build && test -f .output/server/index.mjs
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NITRO_PRESET
        value: render_com
      - key: NODE_ENV
        value: production
